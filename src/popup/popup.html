<!DOCTYPE html>
<html lang="ru" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Компактный Универ</title>
    <link rel="stylesheet" href="popup.css">
</head>

<body>
    <div class="popup-wrap">

        <!-- Шапка -->
        <header class="popup-header">
            <img src="../../icons/icon48.png" alt="" class="popup-logo" aria-hidden="true">
            <div class="popup-title-block">
                <h1 class="popup-title">Компактный Универ</h1>
                <span class="popup-subtitle">ЭОС МГТУ им. Н.Э. Баумана</span>
            </div>
        </header>

        <!-- Основные переключатели -->
        <section class="popup-section" aria-label="Основные настройки">

            <label class="toggle-row" for="edit-mode-cb" title="Показывает элементы редактирования на карточках курсов">
                <span class="toggle-icon">✏️</span>
                <span class="toggle-text">Режим редактирования</span>
                <span class="toggle-spacer"></span>
                <div class="switch-wrap">
                    <input type="checkbox" id="edit-mode-cb" class="switch-input" role="switch">
                    <span class="switch-track"></span>
                </div>
            </label>

            <label class="toggle-row" for="compact-mode-cb" title="Скрывает служебные и ненужные блоки на странице">
                <span class="toggle-icon">🗜️</span>
                <span class="toggle-text">Компактный режим</span>
                <span class="toggle-spacer"></span>
                <div class="switch-wrap">
                    <input type="checkbox" id="compact-mode-cb" class="switch-input" role="switch">
                    <span class="switch-track"></span>
                </div>
            </label>

        </section>

        <!-- Тема оформления -->
        <section class="popup-section" aria-label="Тема оформления">

            <div class="field-row">
                <label for="theme-select" class="field-label">
                    <span class="toggle-icon">🎨</span> Тема
                </label>
                <select id="theme-select" class="field-select" aria-label="Выберите тему">
                    <option value="system">Системная</option>
                    <option value="light">Светлая</option>
                    <option value="dark">Тёмная</option>
                </select>
            </div>

            <div class="field-row" style="margin-top:8px">
                <span class="field-label">
                    <span class="toggle-icon">🖌️</span> Акцент
                </span>
                <div class="accent-row" id="accent-swatches" role="group" aria-label="Цвет акцента">
                    <button type="button" class="accent-swatch" data-accent="violet" style="--sc:#694fa3" title="Фиолетовый" aria-label="Фиолетовый"></button>
                    <button type="button" class="accent-swatch" data-accent="blue"   style="--sc:#00658b" title="Синий"       aria-label="Синий"></button>
                    <button type="button" class="accent-swatch" data-accent="pink"   style="--sc:#95416e" title="Розовый"     aria-label="Розовый"></button>
                    <button type="button" class="accent-swatch" data-accent="red"    style="--sc:#9c4235" title="Красный"     aria-label="Красный"></button>
                    <button type="button" class="accent-swatch" data-accent="green"  style="--sc:#006c4b" title="Зелёный"     aria-label="Зелёный"></button>
                </div>
            </div>

            <label class="toggle-row" for="drawer-cb" title="Современный сворачиваемый вид боковой панели" style="margin-top:8px">
                <span class="toggle-icon">📋</span>
                <span class="toggle-text">Современная боковая панель</span>
                <span class="toggle-spacer"></span>
                <div class="switch-wrap">
                    <input type="checkbox" id="drawer-cb" class="switch-input" role="switch">
                    <span class="switch-track"></span>
                </div>
            </label>

            <label class="toggle-row" for="els-cb" title="Показывает короткий вариант заголовка страницы">
                <span class="toggle-icon">📝</span>
                <span class="toggle-text">Короткий заголовок страницы</span>
                <span class="toggle-spacer"></span>
                <div class="switch-wrap">
                    <input type="checkbox" id="els-cb" class="switch-input" role="switch">
                    <span class="switch-track"></span>
                </div>
            </label>

        </section>

        <!-- Кастомный CSS -->
        <section class="popup-section" aria-label="Кастомный CSS">

            <button type="button" class="collapsible-header" id="custom-css-toggle"
                    aria-expanded="false" aria-controls="custom-css-body">
                <span class="toggle-icon">✏️</span>
                <span class="collapsible-title">Кастомный CSS</span>
                <span class="toggle-spacer"></span>
                <span class="chevron" aria-hidden="true">▸</span>
            </button>

            <div class="collapsible-body" id="custom-css-body" hidden>
                <textarea
                    id="custom-css-ta"
                    class="css-textarea"
                    spellcheck="false"
                    placeholder="/* Ваш CSS поверх темы */"
                    aria-label="Кастомный CSS"></textarea>
                <div class="css-actions">
                    <button id="save-css-btn" class="btn btn-save" type="button">💾 Сохранить</button>
                </div>
            </div>

        </section>

        <!-- Кнопка сброса -->
        <div class="popup-footer">
            <button id="reset-btn" class="btn btn-ghost btn-reset" type="button">
                🔄 Сброс настроек
            </button>
            <div id="status-msg" class="status-msg" role="status" aria-live="polite" hidden></div>
        </div>

    </div>

    <script src="../content/modules/storage-adapter.js"></script>
    <script src="popup.js"></script>
</body>

</html>
