<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>kb_bmstu_lks_fix</title>
    <link rel="stylesheet" href="popup.css">
</head>

<body>
    <div class="popup-container">

        <!-- Header -->
        <div class="popup-header">
            <img src="../../icons/icon48.png" alt="icon" class="popup-icon">
            <div>
                <div class="popup-title">LKS Fix</div>
                <div class="popup-subtitle">МГТУ Калуга</div>
            </div>
        </div>

        <!-- Режим редактирования -->
        <div class="popup-section">
            <label class="toggle-label" title="Включает элементы управления на карточках предметов">
                <input type="checkbox" id="edit-mode-checkbox">
                <span class="toggle-track"><span class="toggle-thumb"></span></span>
                <span class="label-text">Режим редактирования</span>
            </label>
        </div>

        <hr class="divider">

        <!-- Тема оформления -->
        <div class="popup-section">
            <div class="section-title">Тема оформления</div>

            <label class="toggle-label">
                <input type="checkbox" id="theme-enabled-checkbox">
                <span class="toggle-track"><span class="toggle-thumb"></span></span>
                <span class="label-text">Включить кастомную тему</span>
            </label>

            <div class="theme-options" id="theme-options">
                <div class="select-row">
                    <label for="theme-select">Цветовая схема</label>
                    <select id="theme-select">
                        <option value="system">Системная</option>
                        <option value="light">Светлая</option>
                        <option value="dark">Тёмная</option>
                    </select>
                </div>

                <div class="select-row">
                    <label for="accent-select">Акцентный цвет</label>
                    <select id="accent-select">
                        <option value="violet">🟣 Фиолетовый</option>
                        <option value="blue">🔵 Синий</option>
                        <option value="pink">🩷 Розовый</option>
                        <option value="red">🔴 Красный</option>
                        <option value="green">🟢 Зелёный</option>
                    </select>
                </div>
            </div>
        </div>

        <hr class="divider">

        <!-- Компактный вид -->
        <div class="popup-section">
            <div class="section-title">Компактный вид</div>

            <label class="checkbox-label"
                title="Скрывает блок «Калужский филиал МГТУ им. Н.Э. Баумана» в шапке страницы">
                <input type="checkbox" id="hide-university-header-checkbox">
                <span class="label-text">Скрыть заголовок университета</span>
            </label>
        </div>

    </div>

    <!-- storage.js должен грузиться первым, чтобы window.storageAdapter был доступен -->
    <script src="../storage.js"></script>
    <script src="popup.js"></script>
</body>

</html>
