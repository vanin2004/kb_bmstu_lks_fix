<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>kb_bmstu_lks_fix</title>
    <link rel="stylesheet" href="popup.css">
</head>

<body>
    <div class="popup-container">

        <!-- Header -->
        <div class="popup-header">
            <img src="../../icons/icon48.png" alt="icon" class="popup-icon">
            <div>
                <div class="popup-title">LKS Fix</div>
                <div class="popup-subtitle">МГТУ Калуга</div>
            </div>
        </div>

        <!-- Режим редактирования -->
        <div class="popup-section">
            <div class="section-title">Режим редактирования</div>
            <div id="edit-mode-controls">
                <button id="edit-mode-enable-btn" class="popup-btn popup-btn--primary">✏️ Включить</button>
                <div id="edit-mode-active-btns" class="popup-btn-group" style="display: none;">
                    <button id="edit-mode-save-btn" class="popup-btn popup-btn--success">💾 Сохранить</button>
                    <button id="edit-mode-cancel-btn" class="popup-btn popup-btn--muted">✕ Отменить</button>
                </div>
            </div>
        </div>

        <hr class="divider">

        <!-- Тема оформления -->
        <div class="popup-section">
            <div class="section-title">Тема оформления</div>

            <div class="feature-row">
                <label class="toggle-label" title="Включить кастомную тему оформления">
                    <input type="checkbox" id="theme-enabled-checkbox">
                    <span class="toggle-track"><span class="toggle-thumb"></span></span>
                    <span class="label-text">Включить кастомную тему</span>
                </label>
                <button class="gear-btn" data-panel="theme-panel" title="Настройки темы">⚙</button>
            </div>

            <div class="settings-panel" id="theme-panel" style="display:none">
                <div class="select-row">
                    <label for="theme-select">Цветовая схема</label>
                    <select id="theme-select">
                        <option value="system">Системная</option>
                        <option value="light">Светлая</option>
                        <option value="dark">Тёмная</option>
                    </select>
                </div>
                <div class="select-row">
                    <label for="accent-select">Акцентный цвет</label>
                    <select id="accent-select">
                        <option value="violet">🟣 Фиолетовый</option>
                        <option value="blue">🔵 Синий</option>
                        <option value="pink">🩷 Розовый</option>
                        <option value="red">🔴 Красный</option>
                        <option value="green">🟢 Зелёный</option>
                    </select>
                </div>
                <div class="select-row">
                    <label for="tab-icon-select">Иконка вкладки</label>
                    <select id="tab-icon-select">
                        <option value="original">Оригинальная</option>
                        <option value="extension">Как у расширения</option>
                        <option value="Logo_Color_With-BG.svg">Цветной</option>
                        <option value="Logo_Blue_With-BG.svg">Синий</option>
                        <option value="Logo_Black_With-BG.svg">Чёрный</option>
                        <option value="Logo_Red_With-BG.svg">Красный</option>
                    </select>
                </div>
                <div class="settings-actions">
                    <button class="settings-apply-btn" data-panel="theme-panel">Применить</button>
                    <button class="settings-cancel-btn" data-panel="theme-panel">Отмена</button>
                </div>
            </div>
        </div>

        <hr class="divider">

        <!-- Компактный вид -->
        <div class="popup-section">
            <div class="section-title">Компактный вид</div>

            <label class="checkbox-label" title="Скрывает блок «Курсы» с деревом категорий на главной странице">
                <input type="checkbox" id="hide-course-category-combo-checkbox">
                <span class="label-text">Скрыть дерево категорий курсов</span>
            </label>

            <label class="checkbox-label" title="Скрывает ссылку «Все курсы» под списком предметов">
                <input type="checkbox" id="hide-paging-morelink-checkbox">
                <span class="label-text">Скрыть ссылку «Все курсы»</span>
            </label>

            <label class="checkbox-label" title="Скрывает иконку записи в группу МГТУ на карточках предметов">
                <input type="checkbox" id="hide-enrol-icon-checkbox">
                <span class="label-text">Скрыть иконку «Запись группы МГТУ»</span>
            </label>

            <label class="checkbox-label" title="Скрывает шапку страницы (заголовок сайта) на главной странице">
                <input type="checkbox" id="hide-main-page-header-checkbox">
                <span class="label-text">Скрыть шапку на главной странице</span>
            </label>

            <label class="checkbox-label" title="Скрывает логотип в шапке сайта и боковую панель навигации">
                <input type="checkbox" id="hide-header-logo-checkbox">
                <span class="label-text">Скрыть логотип и панель навигации</span>
            </label>
        </div>

        <hr class="divider">

        <!-- Фичи -->
        <div class="popup-section">
            <div class="section-title">Фичи</div>

            <label class="checkbox-label" title="Сортирует курсы на главной странице по алфавиту">
                <input type="checkbox" id="feature-sort-alpha-checkbox">
                <span class="label-text">Сортировка по алфавиту</span>
            </label>

            <label class="checkbox-label" title="Меняет классы odd и even местами у карточек курсов">
                <input type="checkbox" id="feature-swap-odd-even-checkbox">
                <span class="label-text">Поменять местами стиль четных и нечетных карточек курсов</span>
            </label>

            <div class="feature-row">
                <label class="checkbox-label"
                    title="Добавляет поле «Название работы» в диалог загрузки файла и подставляет имя файла в формате ФамилияИО_Группа_Работа_Год">
                    <input type="checkbox" id="feature-auto-filename-checkbox">
                    <span class="label-text">Автозаполнение имени файла</span>
                </label>
                <button class="gear-btn" data-panel="student-info-panel" title="Настройки студента">⚙</button>
            </div>

            <div class="settings-panel" id="student-info-panel" style="display:none">
                <div class="input-row">
                    <label for="student-lastname-input">Фамилия</label>
                    <input type="text" id="student-lastname-input" class="popup-text-input" placeholder="Иванов">
                </div>
                <div class="input-row">
                    <label for="student-firstname-input">Имя</label>
                    <input type="text" id="student-firstname-input" class="popup-text-input" placeholder="Иван">
                </div>
                <div class="input-row">
                    <label for="student-middlename-input">Отчество</label>
                    <input type="text" id="student-middlename-input" class="popup-text-input" placeholder="Алексеевич">
                </div>
                <div class="input-row">
                    <label for="student-group-input">Группа</label>
                    <input type="text" id="student-group-input" class="popup-text-input" placeholder="КБ1-21">
                </div>
                <div class="settings-actions">
                    <button class="settings-apply-btn" data-panel="student-info-panel">Применить</button>
                    <button class="settings-cancel-btn" data-panel="student-info-panel">Отмена</button>
                </div>
            </div>

            <div class="feature-row">
                <label class="checkbox-label"
                    title="Автоматически входить в систему при открытии страницы, если пользователь не авторизован">
                    <input type="checkbox" id="autologin-enabled-checkbox">
                    <span class="label-text">Автоматический вход</span>
                </label>
                <button class="gear-btn" data-panel="autologin-panel" title="Настройки автовхода">⚙</button>
            </div>

            <div class="settings-panel" id="autologin-panel" style="display:none">
                <div class="radio-group">
                    <label class="radio-label">
                        <input type="radio" name="autologin-mode" id="autologin-mode-credentials" value="credentials">
                        <span class="label-text">Логин и пароль</span>
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="autologin-mode" id="autologin-mode-autofill" value="autofill">
                        <span class="label-text">Автозаполнение браузера</span>
                    </label>
                </div>
                <p class="mode-warning" id="autologin-credentials-warning">⚠️ Пароль хранится на диске в профиле
                    браузера без шифрования. Рекомендуем использовать «Автозаполнение браузера».</p>
                <div id="autologin-credentials-section">
                    <div class="input-row">
                        <label for="autologin-username-input">Логин</label>
                        <input type="text" id="autologin-username-input" class="popup-text-input"
                            placeholder="ivanov_ii" autocomplete="username">
                    </div>
                    <div class="input-row">
                        <label for="autologin-password-input">Пароль</label>
                        <input type="password" id="autologin-password-input" class="popup-text-input"
                            placeholder="••••••••" autocomplete="current-password">
                    </div>
                </div>
                <div class="settings-actions">
                    <button class="settings-apply-btn" data-panel="autologin-panel">Применить</button>
                    <button class="settings-cancel-btn" data-panel="autologin-panel">Отмена</button>
                </div>
            </div>
        </div>

        <hr class="divider">

        <!-- Сброс настроек -->
        <div class="popup-section">
            <button id="reset-all-btn" class="popup-btn popup-btn--danger">🗑️ Сбросить все настройки</button>
        </div>

    </div>

    <!-- storage.js должен грузиться первым, чтобы window.storageAdapter был доступен -->
    <script src="../storage.js"></script>
    <script src="popup.js"></script>
</body>

</html>
