<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>kb_bmstu_lks_fix</title>
    <link rel="stylesheet" href="popup.css">
</head>

<body>
    <div class="popup-container">

        <!-- Header -->
        <div class="popup-header">
            <img src="../../icons/icon48.png" alt="icon" class="popup-icon">
            <div>
                <div class="popup-title">LKS Fix</div>
                <div class="popup-subtitle">МГТУ Калуга</div>
            </div>
        </div>

        <!-- Режим редактирования -->
        <div class="popup-section">
            <div class="section-title">Режим редактирования</div>
            <div id="edit-mode-controls">
                <button id="edit-mode-enable-btn" class="popup-btn popup-btn--primary">✏️ Включить</button>
                <div id="edit-mode-active-btns" class="popup-btn-group" style="display: none;">
                    <button id="edit-mode-save-btn" class="popup-btn popup-btn--success">💾 Сохранить</button>
                    <button id="edit-mode-cancel-btn" class="popup-btn popup-btn--muted">✕ Отменить</button>
                </div>
            </div>
        </div>

        <hr class="divider">

        <!-- Тема оформления -->
        <div class="popup-section">
            <div class="section-title">Тема оформления</div>

            <label class="toggle-label">
                <input type="checkbox" id="theme-enabled-checkbox">
                <span class="toggle-track"><span class="toggle-thumb"></span></span>
                <span class="label-text">Включить кастомную тему</span>
            </label>

            <div class="theme-options" id="theme-options">
                <div class="select-row">
                    <label for="theme-select">Цветовая схема</label>
                    <select id="theme-select">
                        <option value="system">Системная</option>
                        <option value="light">Светлая</option>
                        <option value="dark">Тёмная</option>
                    </select>
                </div>

                <div class="select-row">
                    <label for="accent-select">Акцентный цвет</label>
                    <select id="accent-select">
                        <option value="violet">🟣 Фиолетовый</option>
                        <option value="blue">🔵 Синий</option>
                        <option value="pink">🩷 Розовый</option>
                        <option value="red">🔴 Красный</option>
                        <option value="green">🟢 Зелёный</option>
                    </select>
                </div>
            </div>
        </div>

        <hr class="divider">

        <!-- Компактный вид -->
        <div class="popup-section">
            <div class="section-title">Компактный вид</div>

            <label class="checkbox-label" title="Скрывает блок «Курсы» с деревом категорий на главной странице">
                <input type="checkbox" id="hide-course-category-combo-checkbox">
                <span class="label-text">Скрыть дерево категорий курсов</span>
            </label>

            <label class="checkbox-label" title="Скрывает ссылку «Все курсы» под списком предметов">
                <input type="checkbox" id="hide-paging-morelink-checkbox">
                <span class="label-text">Скрыть ссылку «Все курсы»</span>
            </label>
        </div>

        <hr class="divider">

        <!-- Фичи -->
        <div class="popup-section">
            <div class="section-title">Фичи</div>

            <label class="checkbox-label" title="Сортирует курсы на главной странице по алфавиту">
                <input type="checkbox" id="feature-sort-alpha-checkbox">
                <span class="label-text">Сортировка по алфавиту</span>
            </label>

            <label class="checkbox-label" title="Меняет классы odd и even местами у карточек курсов">
                <input type="checkbox" id="feature-swap-odd-even-checkbox">
                <span class="label-text">Поменять odd/even местами</span>
            </label>
        </div>

    </div>

    <!-- storage.js должен грузиться первым, чтобы window.storageAdapter был доступен -->
    <script src="../storage.js"></script>
    <script src="popup.js"></script>
</body>

</html>
